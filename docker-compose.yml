version: '3.8'

services:
  # --- Infrastructure ---
  postgres:
    image: postgres:15-alpine
    container_name: micro_postgres_v2
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: micro_db
    ports:
      - '5434:5432'
    volumes:
      - pgdata_v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d micro_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:6
    container_name: micro_mongo_v2
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    ports:
      - '27018:27017'
    volumes:
      - mongodata_v2:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: micro_rabbitmq_v2
    ports:
      - '5672:5672'
      - '15672:15672'
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Reverse Proxy ---
  nginx:
    image: nginx:alpine
    container_name: micro_nginx_v2
    ports:
      - '9001:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway

  # --- Microservices ---
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: micro_api_gateway_v2
    ports:
      - '3001:3000'
    environment:
      - PORT=3000
      - JWT_SECRET=super_secret_jwt_key
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: micro_auth_service_v2
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://root:rootpassword@postgres:5432/micro_db?schema=auth
      - JWT_SECRET=super_secret_jwt_key
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: micro_user_service_v2
    environment:
      - PORT=3002
      - DATABASE_URL=postgresql://root:rootpassword@postgres:5432/micro_db?schema=users
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: micro_product_service_v2
    environment:
      - PORT=3003
      - MONGO_URI=mongodb://root:rootpassword@mongo:27017/product_db?authSource=admin
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata_v2:
  mongodata_v2:
