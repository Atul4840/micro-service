name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build API Gateway
      run: |
        cd api-gateway
        npm ci
        npm run build
        npm run test --if-present

    - name: Build Auth Service
      run: |
        cd auth-service
        npm ci
        npm run build
        npm run test --if-present

    - name: Build User Service
      run: |
        cd user-service
        npm ci
        npm run build
        npm run test --if-present

    - name: Build Product Service
      run: |
        cd product-service
        npm ci
        npm run build
        npm run test --if-present
